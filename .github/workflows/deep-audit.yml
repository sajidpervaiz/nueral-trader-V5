name: Deep Audit Gate

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  deep-audit:
    name: Tier 0/1 + Full Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install TA-Lib system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget -qO- http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz | tar xz
          cd ta-lib
          ./configure --prefix=/usr
          # TA-Lib 0.4.0's build scripts can race under parallel make on CI runners.
          make -j1
          sudo make install

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^pandas-ta==' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install --no-deps pandas-ta==0.4.71b0

      - name: Run full deep audit gate
        run: |
          bash scripts/deep_audit_full.sh
