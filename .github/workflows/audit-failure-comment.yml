name: Audit Failure PR Comment

on:
  workflow_run:
    workflows: ["Deep Audit Gate"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment-on-failure:
    if: ${{ github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Post failure summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.info('No associated pull request found.');
              return;
            }

            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const runUrl = run.html_url;
            const runId = run.id;
            const branch = run.head_branch;
            const sha = run.head_sha;
            const workflowName = run.name || 'Deep Audit Gate';

            const body = [
              '## Deep Audit Gate Failed',
              '',
              `Workflow: ${workflowName}`,
              `Branch: ${branch}`,
              `Commit: ${sha}`,
              `Run: ${runUrl}`,
              '',
              '### What to do next',
              '1. Open the failed workflow run and inspect the first failed step.',
              '2. Reproduce locally: `bash scripts/deep_audit_full.sh`.',
              '3. Push a fix commit; this PR will be re-checked automatically.',
              '',
              '_Automated by CI governance policy._'
            ].join('\n');

            for (const pr of prs) {
              const issue_number = pr.number;

              // Avoid noisy duplicates: only comment once per run id.
              const marker = `Run: ${runUrl}`;
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number, per_page: 100 }
              );
              const alreadyPosted = comments.some((c) =>
                typeof c.body === 'string' &&
                c.body.includes('## Deep Audit Gate Failed') &&
                c.body.includes(marker)
              );

              if (alreadyPosted) {
                core.info(`Comment already exists for PR #${issue_number} run ${runId}`);
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info(`Posted failure summary to PR #${issue_number}`);
            }
