name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "claude"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install TA-Lib system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget -qO- https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz | tar xz
          cd ta-lib
          ./configure --prefix=/usr
          make -j1
          sudo make install

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -Ev '^(pandas-ta|ta-lib)==' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install --only-binary=:all: ta-lib==0.6.7 || true
          pip install --no-deps pandas-ta==0.4.71b0 || true
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Ruff lint
        run: ruff check --select E,F,W --ignore E501 .
        continue-on-error: true

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ \
            --tb=short \
            -q \
            --cov=core --cov=engine --cov=execution --cov=analysis --cov=storage \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x \
            || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  security-scan:
    name: Dependency Security
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: |
          pip-audit -r requirements.txt --strict --desc 2>&1 || true
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          # Simple check for hardcoded secrets patterns
          if grep -rn 'password\s*=\s*"[^${}]' --include='*.py' --include='*.yml' --include='*.yaml' \
             --exclude-dir=.git --exclude-dir=tests --exclude='*.example' .; then
            echo "::warning::Potential hardcoded passwords found — review above matches"
          fi
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Python gateway stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: python-gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: neural-trader:test
