system:
  name: NUERAL-TRADER-5
  version: "4.0.0"
  paper_mode: true
  log_level: INFO
  log_dir: logs
  timezone: UTC

# ── Exchange configurations ───────────────────────────────────────────────────
exchanges:
  binance:
    enabled: true
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    type: futures
    testnet: true
    symbols:
      - BTC/USDT:USDT
      - ETH/USDT:USDT
      - SOL/USDT:USDT
    rate_limit_rpm: 1200

  bybit:
    enabled: false
    api_key: "${BYBIT_API_KEY}"
    api_secret: "${BYBIT_API_SECRET}"
    type: future
    testnet: true
    symbols:
      - BTC/USDT:USDT
      - ETH/USDT:USDT
    rate_limit_rpm: 600

  okx:
    enabled: false
    api_key: "${OKX_API_KEY}"
    api_secret: "${OKX_API_SECRET}"
    passphrase: "${OKX_PASSPHRASE}"
    type: swap
    testnet: true
    symbols:
      - BTC-USDT-SWAP
      - ETH-USDT-SWAP
    rate_limit_rpm: 600

  kraken:
    enabled: false
    api_key: "${KRAKEN_API_KEY}"
    api_secret: "${KRAKEN_API_SECRET}"
    type: future
    testnet: true
    symbols:
      - PF_XBTUSD
      - PF_ETHUSD
    rate_limit_rpm: 300

# ── DEX configurations ────────────────────────────────────────────────────────
dex:
  enabled: true

  networks:
    ethereum:
      rpc_http: "${ETH_RPC_HTTP}"
      rpc_ws: "${ETH_RPC_WS}"
      chain_id: 1
      explorer: "https://etherscan.io"

    bsc:
      rpc_http: "${BSC_RPC_HTTP}"
      rpc_ws: "${BSC_RPC_WS}"
      chain_id: 56
      explorer: "https://bscscan.com"

    arbitrum:
      rpc_http: "${ARB_RPC_HTTP}"
      rpc_ws: "${ARB_RPC_WS}"
      chain_id: 42161
      explorer: "https://arbiscan.io"

  uniswap:
    enabled: true
    network: ethereum
    factory_v3: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
    quoter_v2: "0x61fFE014bA17989E743c5F6cB21bF9697530B21e"
    swap_router_02: "0x68b3465833fb72A70ecDF485E0e4C7bD8665Fc45"
    fee_tiers: [100, 500, 3000, 10000]
    max_slippage_bps: 50

  sushiswap:
    enabled: true
    network: ethereum
    router: "0xd9e1cE17f2641f24aE83637ab66a2cca9C378B9F"
    max_slippage_bps: 50

  pancakeswap:
    enabled: true
    network: bsc
    router_v2: "0x10ED43C718714eb63d5aA57B78B54704E256024E"
    router_v3: "0x13f4EA83D0bd40E75C8222255bc855a974568Dd4"
    max_slippage_bps: 50

  dydx:
    enabled: true
    network: dydx_chain
    rest_endpoint: "${DYDX_REST_ENDPOINT}"
    ws_endpoint: "${DYDX_WS_ENDPOINT}"
    mnemonic: "${DYDX_MNEMONIC}"

# ── Macro data feeds ──────────────────────────────────────────────────────────
macro:
  funding_rates:
    enabled: true
    sources:
      - binance
      - bybit
      - okx
    fetch_interval_seconds: 300
    arbitrage_threshold_bps: 20

  open_interest:
    enabled: true
    sources:
      - binance
      - bybit
      - okx
    fetch_interval_seconds: 300

  vix_proxy:
    enabled: true
    method: realized_vol
    lookback_periods: [7, 14, 30]
    deribit_enabled: false
    deribit_api: "${DERIBIT_API_KEY}"

# ── Risk management ───────────────────────────────────────────────────────────
risk:
  max_position_size_pct: 0.02
  max_daily_loss_pct: 0.03
  max_drawdown_pct: 0.10
  max_open_positions: 5
  default_leverage: 1.0
  stop_loss_pct: 0.015
  take_profit_pct: 0.03
  kelly_fraction: 0.25
  min_liquidity_usd: 100000
  min_balance_usd: 100        # Minimum wallet balance required for live trading
  initial_equity: 100000

  # Position sizing: "risk_based" = size=(equity*risk_per_trade)/(entry-stop), "fixed_fraction" = equity*max_position_pct
  sizing_method: risk_based
  risk_per_trade_pct: 0.01

  # Pre-trade filters
  max_spread_bps: 10.0
  max_atr_pct: 0.05
  max_exposure_per_symbol_pct: 0.10
  max_funding_rate_bps: 50.0
  min_orderbook_depth_usd: 50000
  max_order_size_usd: 500000
  max_leverage_per_symbol: {}  # e.g. {"BTC/USDT": 10, "ETH/USDT": 5}
  cooldown_seconds: 300
  session_start_utc: "00:00"
  session_end_utc: "23:59"

  # Position management (ATR-based)
  atr_sl_multiplier: 1.5
  rr_ratio: 2.0
  trailing_activation_atr: 2.0
  trailing_distance_atr: 1.0
  breakeven_trigger_atr: 1.0
  max_hold_minutes: 0  # 0 = disabled

  # Circuit breaker
  circuit_breaker_pause_seconds: 3600

  # User data stream safe-mode: seconds of disconnect before blocking new trades (0 = immediate)
  user_stream_safe_mode_seconds: 5

  # VaR
  max_portfolio_var_pct: 0.08
  returns_window: 250
  var_min_history: 30

# ── Signal engine ─────────────────────────────────────────────────────────────
signals:
  timeframes: [1m, 5m, 15m, 1h, 4h, 1d]
  primary_timeframe: 15m
  confirmation_timeframes: [1h, 4h]
  min_score_threshold: 0.65
  ml_weight: 0.25
  technical_weight: 0.30
  sentiment_weight: 0.10
  macro_weight: 0.10
  news_weight: 0.15
  orderbook_weight: 0.10
  min_contributing_factors: 3

# ── Backtester ────────────────────────────────────────────────────────────────
backtest:
  initial_capital: 100000
  commission_pct: 0.0004
  slippage_pct: 0.0002
  use_rust_engine: true
  wfo_splits: 5
  monte_carlo_runs: 1000

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  postgres:
    host: "${POSTGRES_HOST:-localhost}"
    port: 5432
    database: neural_trader
    user: "${POSTGRES_USER:-trader}"
    password: "${POSTGRES_PASSWORD}"
    pool_size: 10
    timescaledb: true

  redis:
    host: "${REDIS_HOST:-localhost}"
    port: 6379
    db: 0
    password: "${REDIS_PASSWORD:-}"
    pool_size: 20
    default_ttl_seconds: 300

# ── Rust hot-path services ────────────────────────────────────────────────────
rust_services:
  enabled: true
  fallback_to_python: true
  tick_parser:
    batch_size: 1000
    channel: "ticks:raw"
  order_matcher:
    max_depth: 500
    channel: "orders:matches"

# ── TypeScript DEX layer ──────────────────────────────────────────────────────
ts_dex_layer:
  enabled: true
  grpc_host: "${TS_DEX_HOST:-localhost}"
  grpc_port: 50051
  health_check_interval_seconds: 30
  quote_cache_ttl_seconds: 10

# ── Jupyter research ──────────────────────────────────────────────────────────
jupyter:
  enabled: false
  port: 8888
  token: "${JUPYTER_TOKEN:-}"
  allow_root: false

# ── ARMS-V2.1 Strategy Configuration ─────────────────────────────────────────
arms:
  regime:
    adx_threshold: 25.0
    strong_adx_threshold: 30.0
    ema200_slope_threshold: 0.0015
    bb_squeeze_percentile: 20.0
    confirmation_candles: 2
    cooldown_candles: 2

  strategy_modules:
    trend_continuation:
      rsi_pullback_low: 40.0
      rsi_pullback_high: 60.0
      volume_min_ratio: 1.2
      rsi_percentile_low: 25.0
      rsi_percentile_high: 75.0
      ema_touch_pct: 0.005
    breakout_expansion:
      bb_squeeze_percentile: 20.0
      volume_breakout_ratio: 2.0
      breakout_margin_pct: 0.001
      consolidation_range_pct: 0.02
      volume_decay_candles: 3
    mean_reversion:
      adx_max: 18.0
      adx_confirm_candles: 5
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      max_trades_per_24h: 2
      max_hold_candles: 12

  pair_tiers:
    tier_1_volume_usd: 200000000
    tier_2_volume_usd: 75000000
    tier_3_volume_usd: 30000000
    max_spread_bps: 15.0
    min_depth_usd: 50000
    filter_interval_seconds: 14400

  risk:
    tier1_risk_pct: 0.0075
    tier2_risk_pct: 0.005
    tier3_risk_pct: 0.0025
    weekly_loss_limit_pct: 0.06
    monthly_loss_limit_pct: 0.10
    dd_graduation_trades: 3
    max_group_exposure_pct: 0.15
    funding_recheck_seconds: 28800
    event_blackout_before_min: 30
    event_blackout_after_min: 15
    weekend_sizing_mult: 0.25
    weekend_halt: false
    liq_monitor_interval_seconds: 60.0
    drawdown_phases:
      normal_max_dd: 0.05
      caution_max_dd: 0.08
      defensive_max_dd: 0.12
    tp_tiers:
      - r_multiple: 1.5
        close_pct: 0.33
      - r_multiple: 2.5
        close_pct: 0.33
    liquidation_safety:
      warning_distance_pct: 0.15
      partial_close_distance_pct: 0.10
      emergency_close_distance_pct: 0.05
    sessions:
      asia: ["00:00", "08:00"]
      london: ["07:00", "16:00"]
      new_york: ["13:00", "22:00"]
    order_splitting:
      twap_threshold_usd: 50000
      twap_slices: 5
      twap_duration_seconds: 300
      iceberg_threshold_usd: 100000
      iceberg_visible_pct: 0.20
    shadow_sl:
      primary_timeout_seconds: 5.0
      max_retries: 3
      shadow_check_interval: 1.0
      fallback_grace_seconds: 10.0

# ── Observability ─────────────────────────────────────────────────────────────
monitoring:
  prometheus:
    enabled: true
    port: 9090
  dashboard_api:
    host: "0.0.0.0"
    port: 8000
    allow_origins:
      - "http://localhost"
      - "http://127.0.0.1"
    auth:
      require_api_key: false
      api_key: "${DASHBOARD_API_KEY}"
      rate_limit_per_min: 120
  telegram:
    enabled: false
    token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  alerts:
    throttle_seconds: 300
    telegram:
      enabled: false
      token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
    discord:
      enabled: false
      webhook_url: "${DISCORD_WEBHOOK_URL}"
    webhook:
      enabled: false
      url: "${ALERT_WEBHOOK_URL}"
      secret: "${ALERT_WEBHOOK_SECRET}"
