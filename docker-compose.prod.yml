version: '3.8'

services:
  # Redis Cluster for high-throughput messaging
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - trading-network

  # NATS JetStream for streaming
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js
    volumes:
      - nats_data:/data
    networks:
      - trading-network

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neural_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - trading-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - trading-network

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    networks:
      - trading-network

  # Traefik reverse proxy
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml
    networks:
      - trading-network

  # Rust Gateway service
  rust-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    ports:
      - "50051:50051"  # gRPC
      - "8001:8001"    # HTTP
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
    depends_on:
      - redis
      - nats
    networks:
      - trading-network

  # Python Trading Engine
  trading-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: python
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://trader:trader_password@postgres:5432/neural_trader
      - LOG_LEVEL=INFO
      - PAPER_TRADING=true
    depends_on:
      - redis
      - nats
      - postgres
    volumes:
      - ./config:/app/config
      - ./research:/app/research
    networks:
      - trading-network

  # TypeScript DEX Layer
  dex-layer:
    build:
      context: ./ts/dex-layer
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  redis_data:
  nats_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
